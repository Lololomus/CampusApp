services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./reports:/app/reports

  frontend:
    ports:
      - "3000:8080"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./backend/uploads:/var/www/uploads:ro

  bot:
    volumes:
      - ./bot:/app
