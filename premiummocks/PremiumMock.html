<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Campus Mini App (SPA)</title>

    <style>
      html, body { height: 100%; }
      body { margin: 0; background: #050505; }
      #root { height: 100%; }
    </style>

    <!-- Import maps для "голых" импортов: react / react-dom / lucide-react -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.323.0?deps=react@18.2.0"
        }
      }
    </script>

    <!-- На случай Safari/старых WebView: importmap shim -->
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <!-- Babel (только для дев-демо: JSX в одном HTML) -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef } from 'react';
import { 
  Search, X, SlidersHorizontal, 
  Home, ShoppingBag, Plus, Heart, User, 
  Eye, MessageCircle, MoreVertical
} from 'lucide-react';


// === ТОКЕНЫ И ТЕМА ===
const theme = {
  bg: '#000000', 
  primary: '#D4FF00', 
  primaryText: '#000000',
  text: '#FFFFFF',
  textMuted: '#888888',
  textBody: '#D1D1D1',
  surfaceElevated: '#1C1C1E', 
  surfaceHover: '#2C2C2E',
  border: 'rgba(255, 255, 255, 0.08)'
};


const tagStyles = {
  'НОВОСТИ': { color: '#4DA6FF', bg: 'rgba(77, 166, 255, 0.15)' },
  'ИНСАЙД': { color: theme.primary, bg: 'rgba(212, 255, 0, 0.15)' },
  'ЖИЗА': { color: '#FF4D4D', bg: 'rgba(255, 77, 77, 0.15)' },
};


// === МОК-ДАННЫЕ ===
const MOCK_POSTS = [
  {
    id: 1,
    author: 'Алексей Иванов',
    avatarLetter: 'А',
    avatarColor: '#4DA6FF',
    meta: 'ВШЭ • 1к',
    tag: 'НОВОСТИ',
    time: 'Только что',
    text: 'Кто-нибудь знает, где в кампусе на Покровке можно спокойно посидеть с ноутом, где есть розетки? 💻🔌 Обошел уже три этажа в центральном атриуме, всё занято первокурами, которые даже не учатся, а просто смотрят тиктоки. Спасайте, у меня дедлайн!',
    image: null,
    likes: 12, comments: 4, views: '142'
  },
  {
    id: 2,
    author: 'Максим Прокурор',
    avatarLetter: 'М',
    avatarColor: theme.primary,
    meta: 'Юрфак • 3 курс',
    tag: 'ИНСАЙД',
    time: '10 минут назад',
    text: 'Срочная инфа для всех, кто пишет курсач у Смирнова: он сегодня не приедет на консультацию. Только что написал старосте. Можете не бежать на Мясницкую. Радуемся и идем спать. 🎉',
    image: 'https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80&w=600',
    likes: 84, comments: 22, views: '3.1k'
  },
  {
    id: 3,
    author: 'Анонимный студент',
    avatarLetter: '?',
    avatarColor: '#FF4D4D',
    meta: 'ФКН',
    tag: 'ЖИЗА',
    time: '42 минуты назад',
    text: 'Отдам даром учебник по эконометрике. Состояние среднее, но все страницы на месте. Самовывоз из общаги в Дубках. Пишите в личку, если нужно. Иначе завтра выброшу. 📚💀',
    image: null,
    likes: 5, comments: 0, views: '89'
  }
];


// === КАРТОЧКА ПОСТА ===
const PostCard = ({ post }) => {
  const [isExpanded, setIsExpanded] = useState(false);
  const isLongText = post.text.length > 110;
  
  const currentTagStyle = tagStyles[post.tag] || { color: theme.text, bg: theme.surfaceElevated };


  return (
    <div style={{ padding: '24px 0', borderBottom: `1px solid ${theme.border}` }}>
      {/* Шапка поста */}
      <div style={{ display: 'flex', gap: '12px', padding: '0 16px' }}>
        <div style={{ 
          width: 44, height: 44, borderRadius: '50%', flexShrink: 0,
          background: post.avatarColor, display: 'flex', alignItems: 'center', 
          justifyContent: 'center', fontSize: '18px', fontWeight: 800, 
          color: post.avatarColor === theme.primary ? '#000' : '#FFF'
        }}>{post.avatarLetter}</div>


        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              <span style={{ fontWeight: 700, fontSize: '16px', color: theme.text, lineHeight: 1.2 }}>{post.author}</span>
              <span style={{ color: theme.textMuted, fontSize: '13px', marginTop: '2px' }}>{post.meta}</span>
            </div>
            
            {/* Плашка Тега (Badge) + Троеточие */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
              <span style={{ 
                color: currentTagStyle.color, background: currentTagStyle.bg, 
                padding: '4px 10px', borderRadius: '10px', fontSize: '11px', 
                fontWeight: 800, letterSpacing: '0.5px' 
              }}>{post.tag}</span>
              <button className="spring-btn" style={{ background: 'none', border: 'none', color: theme.textMuted, cursor: 'pointer', padding: 0, display: 'flex' }}>
                <MoreVertical size={20} />
              </button>
            </div>
          </div>


          {/* Текст поста */}
          <div style={{ position: 'relative', marginTop: '4px' }}>
            <div style={{ maxHeight: isExpanded ? 'none' : '68px', overflow: 'hidden' }}>
              <p style={{ margin: 0, fontSize: '15px', lineHeight: 1.45, color: theme.textBody }}>{post.text}</p>
            </div>
            {isLongText && !isExpanded && (
              <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '30px', background: 'linear-gradient(to bottom, transparent, #000)' }} />
            )}
          </div>
          {isLongText && !isExpanded && (
            <button className="spring-btn" onClick={() => setIsExpanded(true)} style={{ color: theme.primary, background: 'none', border: 'none', padding: '6px 0', fontSize: '14px', fontWeight: 600, cursor: 'pointer' }}>Показать всё</button>
          )}
        </div>
      </div>


      {/* Изображение поста */}
      {post.image && (
        <div style={{ padding: '0 16px', marginTop: '14px' }}>
          <img src={post.image} alt="" style={{ width: '100%', height: 'auto', display: 'block', borderRadius: '16px', border: `1px solid ${theme.border}` }} />
        </div>
      )}


      {/* Футер поста (Время слева, Интерактивы справа) */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '16px', padding: '0 16px' }}>
        
        {/* Время создания (Слева снизу) */}
        <span style={{ color: '#666', fontSize: '13px', fontWeight: 600 }}>
          {post.time}
        </span>
        
        {/* Активные действия (Справа) */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
          <div className="metric-pill read-only">
            <Eye size={16} strokeWidth={2.5} /> <span>{post.views}</span>
          </div>
          <button className="metric-pill">
            <MessageCircle size={16} strokeWidth={2.5} /> <span>{post.comments}</span>
          </button>
          <button className="metric-pill">
            <Heart size={16} strokeWidth={2.5} /> <span>{post.likes}</span>
          </button>
        </div>
      </div>
    </div>
  );
};


function App() {
  const [navTab, setNavTab] = useState('feed');
  const [feedSubTab, setFeedSubTab] = useState('posts');
  
  // Состояния скролла и ручного открытия поиска
  const [isScrolled, setIsScrolled] = useState(false);
  const [isManualExpanded, setIsManualExpanded] = useState(false);
  
  const [searchQuery, setSearchQuery] = useState('');
  
  const scrollContainerRef = useRef(null);
  const searchInputRef = useRef(null);


  // Логика: Показывать полный заголовок если мы в топе ИЛИ если юзер нажал на лупу
  const showDrawer = !isScrolled || isManualExpanded;


  // Автофокус при ручном открытии
  useEffect(() => {
    if (isScrolled && isManualExpanded && searchInputRef.current) {
      searchInputRef.current.focus();
    }
  }, [isManualExpanded, isScrolled]);


  useEffect(() => {
    const handleScroll = (e) => {
      const currentScrollY = e.target.scrollTop;
      
      if (currentScrollY > 40) {
        if (!isScrolled) setIsScrolled(true);
      } else {
        if (isScrolled) {
          setIsScrolled(false);
          setIsManualExpanded(false); // Сбрасываем ручное открытие, когда вернулись наверх
        }
      }
    };
    
    const container = scrollContainerRef.current;
    if (container) {
      container.addEventListener('scroll', handleScroll);
      return () => container.removeEventListener('scroll', handleScroll);
    }
  }, [isScrolled]);


  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', backgroundColor: '#050505', fontFamily: 'system-ui, -apple-system, sans-serif' }}>
      <style>{`
        .spring-btn { transition: transform 0.15s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.15s; }
        .spring-btn:active { transform: scale(0.92); opacity: 0.8; }
        
        /* Стилизация капсул метрик */
        .metric-pill {
          display: flex; align-items: center; gap: 6px; 
          padding: 6px 12px; border-radius: 20px; 
          background: #161618; border: 1px solid #222; 
          color: #888; cursor: pointer;
          font-weight: 600; font-size: 13px;
          transition: all 0.2s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .metric-pill:active { 
          transform: scale(0.9); background: #222; 
          color: #FFF; border-color: #333; 
        }
        .metric-pill.read-only { 
          pointer-events: none; background: transparent; 
          border-color: transparent; padding-left: 0; 
          padding-right: 4px;
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::placeholder { color: ${theme.textMuted}; opacity: 0.7; }
      `}</style>


      {/* IPHONE FRAME */}
      <div style={{ position: 'relative', width: '390px', height: '844px', backgroundColor: '#000', borderRadius: '46px', border: '10px solid #222', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        
        {/* Notch */}
        <div style={{ position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)', width: '120px', height: '32px', backgroundColor: '#000', borderRadius: '16px', zIndex: 1100 }} />


        {/* БЛЮР-ГРАДИЕНТЫ (ФОН ШАПКИ И ФУТЕРА) */}
        <div style={{
          position: 'absolute',
          top: 0,
          left: 0,
          right: 0,
          height: '72px',
          background: 'rgba(0, 0, 0, 0.28)',
          backdropFilter: 'blur(2px)',
          WebkitBackdropFilter: 'blur(2px)',
          zIndex: 50,
          pointerEvents: 'none'
        }} />

        <div style={{
          position: 'absolute',
          top: 0,
          left: 0,
          right: 0,
          height: '128px',
          background: 'rgba(0, 0, 0, 0.10)',
          backdropFilter: 'blur(8px)',
          WebkitBackdropFilter: 'blur(8px)',
          maskImage: 'linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.34) 42%, rgba(0,0,0,0.08) 78%, rgba(0,0,0,0) 100%)',
          WebkitMaskImage: 'linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.34) 42%, rgba(0,0,0,0.08) 78%, rgba(0,0,0,0) 100%)',
          zIndex: 51,
          pointerEvents: 'none'
        }} />

        <div style={{
          position: 'absolute',
          bottom: 0,
          left: 0,
          right: 0,
          height: '60px',
          background: 'rgba(0, 0, 0, 0.60)',
          backdropFilter: 'blur(2px)',
          WebkitBackdropFilter: 'blur(2px)',
          zIndex: 50,
          pointerEvents: 'none'
        }} />

        <div style={{
          position: 'absolute',
          bottom: 0,
          left: 0,
          right: 0,
          height: '106px',
          background: 'rgba(0, 0, 0, 0.20)',
          backdropFilter: 'blur(9px)',
          WebkitBackdropFilter: 'blur(9px)',
          maskImage: 'linear-gradient(to top, rgba(0,0,0,0.94) 0%, rgba(0,0,0,0.60) 42%, rgba(0,0,0,0.18) 78%, rgba(0,0,0,0) 100%)',
          WebkitMaskImage: 'linear-gradient(to top, rgba(0,0,0,0.94) 0%, rgba(0,0,0,0.60) 42%, rgba(0,0,0,0.18) 78%, rgba(0,0,0,0) 100%)',
          zIndex: 51,
          pointerEvents: 'none'
        }} />


        {/* =========================================
            МАГИЧЕСКАЯ ШАПКА
        ========================================= */}
        <header style={{ 
          position: 'absolute', top: 56, left: 16, right: 16, zIndex: 100,
          display: 'flex', flexDirection: 'column'
        }}>
          
          {/* 1. Заголовок (ВСЕГДА ВИДЕН) */}
          <div style={{ 
            height: 28, 
            opacity: 1, 
            marginBottom: 12,
            transform: 'scale(1) translateY(0)',
            overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)'
          }}>
            <h1 style={{ margin: 0, fontSize: '24px', fontWeight: 800, color: '#FFF', letterSpacing: '-0.5px' }}>Campus.</h1>
          </div>


          {/* 2. Ряд: Табы + Появляющаяся Лупа */}
          <div style={{ display: 'flex', alignItems: 'center', height: '44px', width: '100%' }}>
            
            {/* ТАБЫ (Двигаются, давая место лупе) */}
            <div style={{
              flex: 1, // Занимает всё доступное место
              height: '100%',
              background: theme.surfaceElevated, borderRadius: '22px',
              display: 'flex', padding: '4px',
              transition: 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)'
            }}>
              <div style={{ position: 'relative', width: '100%', display: 'flex' }}>
                 <div style={{
                    position: 'absolute', top: 0, bottom: 0, width: 'calc(50% - 4px)',
                    background: theme.primary, borderRadius: '18px',
                    transform: `translateX(${feedSubTab === 'posts' ? '0' : '100%'})`,
                    transition: 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)', zIndex: 1, 
                    boxShadow: `0 2px 10px ${theme.primary}30`
                  }} />
                  <button onClick={() => setFeedSubTab('posts')} style={{ flex: 1, position: 'relative', zIndex: 2, background: 'none', border: 'none', color: feedSubTab === 'posts' ? '#000' : '#FFF', fontWeight: 700, fontSize: '14px', cursor: 'pointer', transition: 'color 0.3s' }}>Посты</button>
                  <button onClick={() => setFeedSubTab('requests')} style={{ flex: 1, position: 'relative', zIndex: 2, background: 'none', border: 'none', color: feedSubTab === 'requests' ? '#000' : '#FFF', fontWeight: 700, fontSize: '14px', cursor: 'pointer', transition: 'color 0.3s' }}>Запросы</button>
              </div>
            </div>


            {/* ЛУПА (Появляется ТОЛЬКО при скролле) */}
            <div style={{
              width: isScrolled ? '44px' : '0px',
              marginLeft: isScrolled ? '8px' : '0px',
              opacity: isScrolled ? 1 : 0,
              overflow: 'hidden',
              transition: 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)',
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
              <button
                onClick={() => setIsManualExpanded(!isManualExpanded)}
                className="spring-btn"
                style={{
                  width: '44px', height: '44px', borderRadius: '22px',
                  background: isManualExpanded ? theme.primary : theme.surfaceElevated, 
                  border: 'none', 
                  color: isManualExpanded ? '#000' : '#FFF',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
                  flexShrink: 0,
                  transition: 'background 0.3s, color 0.3s'
                }}
              >
                {/* Иконка меняется с Лупы на Крестик */}
                {isManualExpanded ? <X size={20} strokeWidth={2.5} /> : <Search size={20} strokeWidth={2.5} />}
              </button>
            </div>
          </div>


          {/* 3. ДРОУЕР (Поиск + Теги) - Выезжает вниз */}
          <div style={{
            display: 'grid',
            // Вот тут магия CSS Grid для идеальной анимации высоты "в ноль"
            gridTemplateRows: showDrawer ? '1fr' : '0fr',
            transition: 'grid-template-rows 0.4s cubic-bezier(0.32, 0.72, 0, 1)'
          }}>
            <div style={{ minHeight: 0, overflow: 'hidden' }}>
              <div style={{ 
                paddingTop: '12px', paddingBottom: '4px',
                display: 'flex', flexDirection: 'column', gap: '12px',
                opacity: showDrawer ? 1 : 0,
                transform: showDrawer ? 'translateY(0)' : 'translateY(-10px)',
                transition: 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)'
              }}>
                
                {/* Строка поиска */}
                <div style={{ display: 'flex', alignItems: 'center', height: '44px', padding: '0 16px', background: '#161618', borderRadius: '22px', border: `1px solid ${theme.border}` }}>
                  <Search size={18} style={{ color: theme.textMuted, marginRight: '10px' }} />
                  <input 
                    ref={searchInputRef}
                    value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} 
                    placeholder="Найти посты, инсайды..."
                    style={{ flex: 1, height: '100%', background: 'transparent', border: 'none', color: '#FFF', fontSize: '15px', outline: 'none' }}
                  />
                  {searchQuery && <X size={16} onClick={() => setSearchQuery('')} style={{ color: theme.textMuted, cursor: 'pointer' }}/>}
                </div>


                {/* Лента быстрых тегов */}
                <div className="hide-scroll" style={{ display: 'flex', gap: '8px', overflowX: 'auto' }}>
                  <button className="spring-btn" style={{ width: '36px', height: '36px', borderRadius: '18px', background: theme.surfaceElevated, color: '#FFF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, cursor: 'pointer', border: 'none' }}>
                    <SlidersHorizontal size={16} />
                  </button>
                  {['🔥 Популярное', '📚 Учеба', '🤡 Мемы', '🏠 Общага'].map(tag => (
                    <button key={tag} className="spring-btn" style={{ padding: '0 14px', height: '36px', borderRadius: '18px', background: theme.surfaceElevated, color: '#FFF', fontSize: '13px', fontWeight: 600, whiteSpace: 'nowrap', cursor: 'pointer', border: 'none' }}>{tag}</button>
                  ))}
                </div>


              </div>
            </div>
          </div>
        </header>


        {/* =========================================
            КОНТЕНТ ЛЕНТЫ
        ========================================= */}
        <div ref={scrollContainerRef} className="hide-scroll" style={{ flex: 1, overflowY: 'auto', paddingTop: '240px', paddingBottom: '120px', zIndex: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', margin: '0 16px 16px' }}>
            <div style={{ flex: 1, height: '1px', background: theme.border }} />
            <span style={{ padding: '0 12px', color: theme.textMuted, fontSize: '12px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Сегодня</span>
            <div style={{ flex: 1, height: '1px', background: theme.border }} />
          </div>


          {MOCK_POSTS.map(post => (
            <PostCard key={post.id} post={post} />
          ))}
          
          <div style={{ height: '40px' }}/>
        </div>


        {/* =========================================
            НИЖНИЙ ТАББАР
        ========================================= */}
        <div style={{ position: 'absolute', bottom: '16px', left: '16px', right: '16px', zIndex: 100, pointerEvents: 'none', display: 'flex', justifyContent: 'center' }}>
          <nav style={{ background: theme.surfaceElevated, borderRadius: '32px', padding: '8px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', pointerEvents: 'auto', boxShadow: '0 20px 40px rgba(0,0,0,0.8)' }}>
            {[ { id: 'feed', icon: Home }, { id: 'market', icon: ShoppingBag }, { id: 'create', isAction: true }, { id: 'dating', icon: Heart }, { id: 'profile', icon: User } ].map((tab, i) => {
              if (tab.isAction) return (
                <button key="create" className="spring-btn" style={{ width: '48px', height: '48px', borderRadius: '24px', background: theme.primary, border: 'none', color: theme.primaryText, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', margin: '0 8px', flexShrink: 0, boxShadow: `0 4px 16px ${theme.primary}40` }}><Plus size={26} strokeWidth={3} /></button>
              );
              const Icon = tab.icon;
              return (
                <button key={i} className="spring-btn" style={{ flex: 1, height: '48px', background: 'transparent', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: i === 0 ? '#FFFFFF' : theme.textMuted, cursor: 'pointer', position: 'relative' }}>
                  {i === 0 && <div style={{ position: 'absolute', top: -8, width: '24px', height: '4px', borderRadius: '0 0 4px 4px', background: '#FFFFFF', boxShadow: `0 4px 12px rgba(255,255,255,0.4)` }}/>}
                  <Icon size={22} strokeWidth={i === 0 ? 2.5 : 2} />
                </button>
              );
            })}
          </nav>
        </div>


      </div>
    </div>
  );
}

// Монтирование SPA
import { createRoot } from 'react-dom/client';
createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
